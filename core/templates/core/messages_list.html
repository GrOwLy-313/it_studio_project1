<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сообщения — ITишник</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d47;--accent:#3b82f6;--accent2:#06b6d4;--green:#10b981;--text:#f1f5f9;--muted:#64748b;--muted2:#94a3b8;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .container{width:100%;max-width:520px;}
        .header{margin-bottom:24px;}
        .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;margin-bottom:16px;transition:color 0.2s;}
        .back-btn:hover{color:var(--text);}
        .header h1{font-size:22px;font-weight:800;}
        .header p{color:var(--muted);font-size:13px;margin-top:4px;}
        .contacts-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
        .contact-item{display:flex;align-items:center;gap:14px;padding:16px 20px;text-decoration:none;color:var(--text);border-bottom:1px solid var(--border);transition:background 0.15s;}
        .contact-item:last-child{border-bottom:none;}
        .contact-item:hover{background:var(--surface2);}
        .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;}
        .avatar.teacher{background:linear-gradient(135deg,var(--accent),#2563eb);}
        .avatar.student{background:linear-gradient(135deg,var(--green),#059669);}
        .avatar.admin{background:linear-gradient(135deg,#8b5cf6,#6d28d9);}
        .contact-info .name{font-weight:700;font-size:14px;}
        .contact-info .role{font-size:12px;color:var(--muted);margin-top:2px;}
        .arrow{margin-left:auto;color:var(--muted);font-size:18px;}
        .empty{padding:48px 20px;text-align:center;color:var(--muted);}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{% url 'calendar' %}" class="back-btn">← Назад в расписание</a>
            <h1>💬 Мои диалоги</h1>
            <p>Выберите собеседника для начала общения</p>
        </div>
        <div class="contacts-card">
            {% for u in users %}
                <a href="{% url 'chat' u.id %}" class="contact-item">
                    <div class="avatar {{ u.role }}">{{ u.username|first|upper }}</div>
                    <div class="contact-info">
                        <div class="name">{{ u.username }}</div>
                        <div class="role">{{ u.get_role_display }}</div>
                    </div>
                    <div class="arrow">›</div>
                </a>
            {% empty %}
                <div class="empty">📭 Контактов пока нет</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
