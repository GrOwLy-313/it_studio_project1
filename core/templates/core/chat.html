<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат — ITишник</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
            --border:#1e2d47;--accent:#3b82f6;--accent2:#06b6d4;
            --green:#10b981;--text:#f1f5f9;--muted:#64748b;--muted2:#94a3b8;
        }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column; }
        .chat-header {
            background:var(--surface);border-bottom:1px solid var(--border);
            padding:16px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;
        }
        .back-btn {
            padding:8px 14px;background:var(--surface2);border:1px solid var(--border);
            border-radius:8px;color:var(--muted2);text-decoration:none;font-size:13px;
            font-weight:600;transition:all 0.2s;
        }
        .back-btn:hover{color:var(--text);border-color:var(--accent);}
        .chat-header .avatar {
            width:40px;height:40px;border-radius:50%;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            display:flex;align-items:center;justify-content:center;
            font-weight:800;font-size:16px;
        }
        .chat-header .info .name{font-weight:700;font-size:15px;}
        .chat-header .info .status{font-size:12px;color:var(--green);}

        .messages {flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:12px;}
        .messages::-webkit-scrollbar{width:4px;}
        .messages::-webkit-scrollbar-track{background:transparent;}
        .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

        .msg{display:flex;flex-direction:column;max-width:65%;}
        .msg.mine{align-self:flex-end;align-items:flex-end;}
        .msg.theirs{align-self:flex-start;align-items:flex-start;}
        .msg .bubble{
            padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;
        }
        .msg.mine .bubble{
            background:linear-gradient(135deg,var(--accent),#2563eb);color:white;
            border-bottom-right-radius:4px;
        }
        .msg.theirs .bubble{
            background:var(--surface2);border:1px solid var(--border);color:var(--text);
            border-bottom-left-radius:4px;
        }
        .msg .time{font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace;}

        .chat-input{
            background:var(--surface);border-top:1px solid var(--border);
            padding:16px 24px;display:flex;gap:12px;align-items:center;flex-shrink:0;
        }
        .chat-input input{
            flex:1;background:var(--surface2);border:1.5px solid var(--border);
            border-radius:12px;color:var(--text);padding:12px 16px;
            font-family:'Manrope',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s;
        }
        .chat-input input:focus{border-color:var(--accent);}
        .chat-input input::placeholder{color:var(--muted);}
        .btn-send{
            padding:12px 20px;background:linear-gradient(135deg,var(--accent),#2563eb);
            border:none;border-radius:12px;color:white;font-family:'Manrope',sans-serif;
            font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;
        }
        .btn-send:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.35);}
        .day-divider{text-align:center;color:var(--muted);font-size:12px;margin:8px 0;}
        .day-divider span{background:var(--surface);padding:4px 12px;border-radius:20px;border:1px solid var(--border);}
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="{% url 'messages_list' %}" class="back-btn">← Назад</a>
        <div class="avatar">{{ other_user.username|first|upper }}</div>
        <div class="info">
            <div class="name">{{ other_user.username }}</div>
            <div class="status">● {{ other_user.get_role_display }}</div>
        </div>
    </div>

    <div class="messages" id="messages">
        {% for msg in chat_messages %}
            <div class="msg {% if msg.sender == user %}mine{% else %}theirs{% endif %}">
                <div class="bubble">{{ msg.text }}</div>
                <div class="time">{{ msg.created_at|date:"d.m · H:i" }}</div>
            </div>
        {% empty %}
            <div class="day-divider"><span>Начните диалог — напишите первое сообщение</span></div>
        {% endfor %}
    </div>

    <form class="chat-input" method="post">
        {% csrf_token %}
        <input type="text" name="text" placeholder="Напишите сообщение..." required autocomplete="off" id="msgInput">
        <button type="submit" class="btn-send">Отправить →</button>
    </form>

    <script>
        const m = document.getElementById('messages');
        m.scrollTop = m.scrollHeight;
        document.getElementById('msgInput').focus();
    </script>
</body>
</html>
