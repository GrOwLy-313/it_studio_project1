<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат с {{ other_user.username }}</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .chat-header { background: #007bff; color: white; padding: 15px; text-align: center; }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { max-width: 70%; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .my-message { align-self: flex-end; background: #007bff; color: white; }
        .other-message { align-self: flex-start; background: #e4e6eb; color: #333; }
        .chat-input { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { margin-left: 10px; background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="{% url 'calendar' %}" style="color: white; float: left; text-decoration: none;">← Назад</a>
        Чат с {{ other_user.username }}
    </div>

    <div class="messages-container">
        {% for msg in chat_messages %}
            <div class="message {% if msg.sender == user %}my-message{% else %}other-message{% endif %}">
                {{ msg.text }}
                <div style="font-size: 0.7em; opacity: 0.8; text-align: right;">{{ msg.created_at|date:"H:i" }}</div>
            </div>
        {% endfor %}
    </div>

    <form class="chat-input" method="post">
        {% csrf_token %}
        <input type="text" name="text" placeholder="Напишите сообщение..." required autocomplete="off">
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
